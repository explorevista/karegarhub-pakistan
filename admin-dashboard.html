<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – KarigarHub Pakistan</title>

  <!-- SEO -->
  <meta name="description" content="Admin dashboard for KarigarHub Pakistan">

  <!-- Favicon -->
  <link rel="icon" href="assets/images/favicon.png">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      font-family:'Poppins',sans-serif;
      background:#0b0b0b;
      color:#fff;
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      padding:15px 40px;
      background:rgba(0,0,0,0.8);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .logo{
      font-weight:800;
      font-size:22px;
    }

    .gold{ color:#D4AF37; }

    .btn{
      background:linear-gradient(45deg,#D4AF37,#FFD700);
      color:#000;
      padding:8px 15px;
      border:none;
      border-radius:25px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
      box-shadow:0 0 10px #D4AF37;
    }

    .card{
      background:rgba(255,255,255,0.05);
      padding:20px;
      border-radius:15px;
      margin-bottom:20px;
      backdrop-filter:blur(10px);
    }

    .loader{
      border:4px solid #222;
      border-top:4px solid #D4AF37;
      border-radius:50%;
      width:30px;
      height:30px;
      animation:spin 1s linear infinite;
      margin:auto;
    }

    @keyframes spin{
      100%{transform:rotate(360deg);}
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#111;
      color:#D4AF37;
    }

    td, th{
      padding:10px;
    }

    img.preview{
      width:80px;
      margin-top:10px;
      display:none;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="logo">Karigar<span class="gold">Hub</span></div>
  <button id="logoutBtn" class="btn">Logout</button>
</nav>

<main style="padding:20px;">

<h1>⚙️ Admin Panel</h1>

<!-- STATS -->
<div class="card">
  <h3>Stats</h3>
  <p>Users: <span id="statUsers">...</span></p>
  <p>Workers: <span id="statWorkers">...</span></p>
  <p>Tickets: <span id="statTickets">...</span></p>
</div>

<!-- ADD WORKER -->
<div class="card">
  <h3>Add Worker</h3>

  <form id="workerForm">
    <input type="text" id="workerName" placeholder="Name" required><br><br>
    <input type="text" id="workerPhone" placeholder="Phone" required><br><br>
    <input type="file" id="workerPhoto"><br>
    <img id="preview" class="preview"><br>
    <button class="btn">Save Worker</button>
  </form>
</div>

<!-- WORKERS TABLE -->
<div class="card">
  <h3>Workers</h3>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Phone</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="workersTable">
      <tr>
        <td colspan="3"><div class="loader"></div></td>
      </tr>
    </tbody>
  </table>
</div>

</main>

<script type="module">
import { auth, db, onAuthStateChanged, collection, getDocs, addDoc, deleteDoc, doc } from './firebase.js';
import { uploadToImgBB } from './app.js';

const ADMIN_EMAIL = "smarttoolsuniverse2026@gmail.com";

/* AUTH CHECK */
onAuthStateChanged(auth, user=>{
  if(!user || user.email !== ADMIN_EMAIL || !user.emailVerified){
    alert("No Access");
    window.location.href="index.html";
  }else{
    loadWorkers();
  }
});

/* LOAD WORKERS */
async function loadWorkers(){
  const snap = await getDocs(collection(db,"workers"));
  const tbody = document.getElementById("workersTable");

  tbody.innerHTML = snap.docs.map(d=>{
    const w = d.data();
    return `
      <tr>
        <td>${w.name}</td>
        <td>${w.phone}</td>
        <td>
          <button onclick="del('${d.id}')" class="btn">Delete</button>
        </td>
      </tr>
    `;
  }).join("");
}

/* ADD WORKER */
document.getElementById("workerForm").addEventListener("submit", async e=>{
  e.preventDefault();

  let photoUrl="";
  const file = document.getElementById("workerPhoto").files[0];

  if(file){
    photoUrl = await uploadToImgBB(file);
  }

  await addDoc(collection(db,"workers"),{
    name:workerName.value,
    phone:workerPhone.value,
    photo:photoUrl
  });

  alert("Added");
  loadWorkers();
});

/* DELETE */
window.del = async(id)=>{
  await deleteDoc(doc(db,"workers",id));
  loadWorkers();
};

/* PREVIEW */
workerPhoto.addEventListener("change", e=>{
  const file = e.target.files[0];
  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display="block";
  }
});

/* LOGOUT */
logoutBtn.onclick=async ()=>{
  await auth.signOut();
  location.href="index.html";
};
</script>

</body>
</html>

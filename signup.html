<!DOCTYPE html>
<html lang="en-PK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – GharFix Pakistan</title>
  <meta name="description" content="Create a free GharFix account to book home services in Pakistan.">
  
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="toast" role="status" aria-live="polite"></div>
  
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="GharFix" class="logo-img" onerror="this.style.display='none'">
        GharFix<span>.pk</span>
      </a>
      <button class="btn btn-sm btn-outline" id="themeToggle">🌓</button>
    </div>
  </nav>
  
  <main id="main">
    <section class="auth-container">
      <div class="container">
        <div class="card auth-card glass animate-fade">
          <h2>Create Account</h2>
          <p class="text-center text-muted mb-4">Join GharFix to book trusted home services</p>
          
          <form id="signupForm" class="form">
            <div class="form-group">
              <label for="signupName">Full Name</label>
              <input type="text" id="signupName" class="form-control" placeholder="Muhammad Ali" required autocomplete="name">
            </div>
            
            <div class="form-group">
              <label for="signupEmail">Email Address</label>
              <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
              <label for="signupPassword">Password</label>
              <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required minlength="6" autocomplete="new-password">
              <small class="text-muted">Must be at least 6 characters</small>
            </div>
            
            <div class="form-group">
              <label for="signupConfirm">Confirm Password</label>
              <input type="password" id="signupConfirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
              <span class="btn-text">Create Account</span>
              <span class="loading hidden"></span>
            </button>
          </form>
          
          <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script type="module">
    import { initFirebase, auth, createUserWithEmailAndPassword, sendEmailVerification, doc, setDoc, serverTimestamp, showToast } from './firebase.js';
    import { initTheme } from './app.js';
    
    initTheme();
    await initFirebase();
    
    document.getElementById('signupForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const btnText = btn.querySelector('.btn-text');
      const loading = btn.querySelector('.loading');
      
      // Validation
      if (!name) {
        showToast('Please enter your name', 'error');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('Please enter a valid email', 'error');
        return;
      }
      if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match', 'error');
        return;
      }
      
      btn.disabled = true;
      btnText.classList.add('hidden');
      loading.classList.remove('hidden');
      
      try {
        // Create Firebase user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Send verification email
        await sendEmailVerification(user);
        
        // Create user document in Firestore
        await setDoc(doc(db, 'users', user.uid), {
          name,
          email,
          role: 'user',
          phone: '',
          location: '',
          photo: '',
          emailVerified: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        
        showToast('Account created! Please check your email to verify.', 'success');
        
        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 2000);
        
      } catch (error) {
        console.error('Signup error:', error);
        
        const messages = {
          'auth/email-already-in-use': 'This email is already registered',
          'auth/invalid-email': 'Invalid email address',
          'auth/weak-password': 'Password is too weak',
          'auth/operation-not-allowed': 'Email signup is not enabled'
        };
        
        showToast(messages[error.code] || 'Signup failed. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
      }
    });
  </script>
</body>
</html>

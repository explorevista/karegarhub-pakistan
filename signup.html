<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – KarigarHub Pakistan</title>
  <meta name="description" content="Create a free KarigarHub account to book home services in Pakistan.">
  
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="toast" role="status" aria-live="polite"></div>
  
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="KarigarHub" class="logo-img" onerror="this.style.display='none'">
        KarigarHub.pk
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌓</button>
    </div>
  </nav>
  
  <main id="main">
    <section class="section" style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center;">
      <div class="container">
        <div class="card glass" style="max-width: 480px; margin: 0 auto; padding: 3rem; border: 2px solid var(--primary);">
          <h2 class="text-center" data-i18n="createAccount">Create Account</h2>
          <p class="text-center text-muted mb-4" data-i18n="signupSubtitle">Join KarigarHub to book trusted home services</p>
          
          <form id="signupForm" class="form">
            <div class="form-group">
              <label for="signupName" data-i18n="fullName">Full Name</label>
              <input type="text" id="signupName" class="form-control" placeholder="Muhammad Ali" required autocomplete="name">
            </div>
            
            <div class="form-group">
              <label for="signupEmail" data-i18n="email">Email Address</label>
              <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
              <label for="signupPassword" data-i18n="password">Password</label>
              <div class="password-wrapper">
                <input type="password" id="signupPassword" class="form-control" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
              </div>
              <small class="text-muted" data-i18n="passHint">Must be at least 6 characters</small>
            </div>
            
            <div class="form-group">
              <label for="signupConfirm" data-i18n="confirmPassword">Confirm Password</label>
              <div class="password-wrapper">
                <input type="password" id="signupConfirm" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
              <span class="btn-text" data-i18n="createAccount">Create Account</span>
              <span class="loading hidden"></span>
            </button>
          </form>
          
          <div class="auth-footer text-center mt-4">
            <p class="text-muted" data-i18n="hasAccount">Already have an account?</p>
            <a href="login.html" class="btn btn-outline btn-sm" data-i18n="logIn">Login</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, sendEmailVerification, doc, setDoc, serverTimestamp } from './firebase.js';
    import { showToast } from './app.js';
    
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const btnText = btn.querySelector('.btn-text');
      const loading = btn.querySelector('.loading');
      
      // Validation
      if (!name) { showToast('Please enter your name', 'error'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showToast('Please enter a valid email', 'error'); return; }
      if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
      
      // Show loading
      btn.disabled = true;
      btnText.classList.add('hidden');
      loading.classList.remove('hidden');
      
      try {
        // Create Firebase user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        // Send verification email
        await sendEmailVerification(user);
        
        // Create user document in Firestore
        await setDoc(doc(db, 'users', user.uid), {
          name,
          email,
          role: 'user',
          phone: '',
          location: '',
          photo: '',
          emailVerified: false,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        
        showToast('Account created! Please check your email to verify.', 'success');
        
        // Redirect after delay
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 2000);
        
      } catch (error) {
        console.error('Signup error:', error);
        
        const messages = {
          'auth/email-already-in-use': 'This email is already registered',
          'auth/invalid-email': 'Invalid email address',
          'auth/weak-password': 'Password is too weak',
          'auth/operation-not-allowed': 'Email signup is not enabled'
        };
        
        showToast(messages[error.code] || 'Signup failed. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
      }
    });
  </script>
</body>
</html>

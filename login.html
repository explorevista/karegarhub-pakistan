<!DOCTYPE html>
<html lang="en-PK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – GharFix Pakistan</title>
  <meta name="description" content="Login to your GharFix account to book services and manage your profile.">
  
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <div id="toast" role="status" aria-live="polite"></div>
  
  <!-- Minimal Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="GharFix" class="logo-img" onerror="this.style.display='none'">
        GharFix<span>.pk</span>
      </a>
      <button class="btn btn-sm btn-outline" id="themeToggle">🌓</button>
    </div>
  </nav>
  
  <main id="main">
    <section class="auth-container">
      <div class="container">
        <div class="card auth-card glass animate-fade">
          <h2>Welcome Back</h2>
          <p class="text-center text-muted mb-4">Login to access your GharFix account</p>
          
          <form id="loginForm" class="form">
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required minlength="6" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
              <span class="btn-text">Login</span>
              <span class="loading hidden"></span>
            </button>
          </form>
          
          <p class="text-center mt-3">
            <a href="forgot-password.html" class="text-primary">Forgot password?</a>
          </p>
          
          <div class="auth-footer">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
          </div>
        </div>
      </div>
    </section>
  </main>
  
  <script type="module">
    import { initFirebase, auth, signInWithEmailAndPassword, showToast } from './firebase.js';
    import { initTheme } from './app.js';
    
    // Initialize
    initTheme();
    await initFirebase();
    
    // Login form handler
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const btnText = btn.querySelector('.btn-text');
      const loading = btn.querySelector('.loading');
      
      // Validate
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showToast('Please enter a valid email', 'error');
        return;
      }
      
      // Show loading
      btn.disabled = true;
      btnText.classList.add('hidden');
      loading.classList.remove('hidden');
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('Login successful! Redirecting...', 'success');
        
        // Redirect after short delay
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
        
      } catch (error) {
        console.error('Login error:', error);
        
        const messages = {
          'auth/invalid-email': 'Invalid email address',
          'auth/user-disabled': 'This account has been disabled',
          'auth/user-not-found': 'No account found with this email',
          'auth/wrong-password': 'Incorrect password',
          'auth/invalid-credential': 'Invalid email or password'
        };
        
        showToast(messages[error.code] || 'Login failed. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
